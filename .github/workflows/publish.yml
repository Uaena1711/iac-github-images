# =============================================================================
# iac-github-images :: build + push the tool images to GHCR (public).
#
# Two per-domain images bake the heavy CI tools so tf-env/cfn-env/tf-docs jobs install NOTHING
# heavy at runtime (jq is the only tolerated auto-install elsewhere). Bases are GHCR public
# (no Docker Hub / no ECR) -> no pull-rate-limit exposure at build; the published images are
# GHCR public -> unlimited pulls.
#
# This is a THIN caller of the catalog's reusable docker-image.yml (provider: ghcr) — the image
# builds dogfood iac-github instead of carrying their own build logic. One matrix leg per image.
# =============================================================================
name: publish-images

on:
  release:
    types: [published]
  workflow_dispatch:            # branch preview builds for the pre-merge live test
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/publish.yml'

permissions:
  contents: read
  packages: write               # GHCR push via GITHUB_TOKEN (forwarded by secrets: inherit)

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: iac-github-tf,  context: images/terraform }
          - { name: iac-github-cfn, context: images/aws }
    uses: Uaena1711/iac-github/.github/workflows/docker-image.yml@feat/docker-image-pipeline
    with:
      image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
      name: ${{ matrix.image.name }}
      context: ${{ matrix.image.context }}
      provider: ghcr
      platforms: linux/amd64      # GH Actions container jobs are Linux/amd64 -> no arm64, no QEMU, no --privileged
    secrets: inherit

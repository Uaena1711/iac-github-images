# =============================================================================
# iac-github :: build + push the tool images to GHCR (public).
#
# Two per-domain images bake the heavy CI tools so tf-env/cfn-env/tf-docs jobs install NOTHING
# heavy at runtime (jq is the only tolerated auto-install elsewhere). Bases are GHCR public
# (no Docker Hub / no ECR) → no pull-rate-limit exposure at build; the published images are
# GHCR public → unlimited pulls for consumers.
#
# Pattern adapted from the user's grist-core docker.yml (release-triggered, image matrix,
# build-push-action + buildx + metadata-action + gha cache), swapped to GHCR + digest output.
# =============================================================================
name: publish-images

on:
  release:
    types: [published]
  workflow_dispatch:            # branch preview builds for the pre-merge live test
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/publish.yml'

permissions:
  contents: read
  packages: write               # GHCR push via GITHUB_TOKEN

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: iac-github-tf
            context: images/terraform
          - name: iac-github-cfn
            context: images/aws
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Digest (pin this in the tf-env/cfn-env defaults)
        run: |
          {
            echo "### ${{ matrix.image.name }}"
            echo '```'
            echo "ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

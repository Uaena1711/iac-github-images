# =============================================================================
# iac-github-images :: build + push the tool images to GHCR (public) AND mirror to ECR.
#
# Two per-domain images bake the heavy CI tools so tf-env/cfn-env/tf-docs jobs install NOTHING
# heavy at runtime. Thin caller of the catalog's reusable docker-image.yml — one named job per
# image per registry (like the terraform consumer's dev/prod), only the `provider` input differs:
#   tf / cfn          -> GHCR   (provider: ghcr, GITHUB_TOKEN)
#   tf-ecr / cfn-ecr  -> ECR    (provider: ecr, keyless GitHub OIDC -> AssumeRoleWithWebIdentity)
# =============================================================================
name: publish-images

on:
  release:
    types: [published]
  workflow_dispatch:            # branch preview builds for the pre-merge live test
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/publish.yml'

permissions:
  contents: read
  packages: write               # GHCR push via GITHUB_TOKEN (ghcr jobs)
  id-token: write               # keyless AWS OIDC (ecr jobs)

jobs:
  tf:
    uses: Uaena1711/iac-github/.github/workflows/docker-image.yml@feat/ecr-provider
    with:
      image: ghcr.io/${{ github.repository_owner }}/iac-github-tf
      name: iac-github-tf
      context: images/terraform
      provider: ghcr
      platforms: linux/amd64      # GH Actions container jobs are Linux/amd64 -> no arm64, no QEMU
    secrets: inherit

  cfn:
    uses: Uaena1711/iac-github/.github/workflows/docker-image.yml@feat/ecr-provider
    with:
      image: ghcr.io/${{ github.repository_owner }}/iac-github-cfn
      name: iac-github-cfn
      context: images/aws
      provider: ghcr
      platforms: linux/amd64
    secrets: inherit

  # ECR mirror — same template, provider: ecr. Keyless: the ecr provider assumes the OIDC role
  # in-script. Repos are pre-created in the account; the role grants ecr:GetAuthorizationToken + push.
  tf-ecr:
    uses: Uaena1711/iac-github/.github/workflows/docker-image.yml@feat/ecr-provider
    with:
      image: 377521353143.dkr.ecr.us-east-1.amazonaws.com/iac-github-tf
      name: iac-github-tf-ecr
      context: images/terraform
      provider: ecr
      registry: 377521353143.dkr.ecr.us-east-1.amazonaws.com
      aws_region: us-east-1
      aws_role_arn: arn:aws:iam::377521353143:role/iac-github-oidc-test
      platforms: linux/amd64
    secrets: inherit

  cfn-ecr:
    uses: Uaena1711/iac-github/.github/workflows/docker-image.yml@feat/ecr-provider
    with:
      image: 377521353143.dkr.ecr.us-east-1.amazonaws.com/iac-github-cfn
      name: iac-github-cfn-ecr
      context: images/aws
      provider: ecr
      registry: 377521353143.dkr.ecr.us-east-1.amazonaws.com
      aws_region: us-east-1
      aws_role_arn: arn:aws:iam::377521353143:role/iac-github-oidc-test
      platforms: linux/amd64
    secrets: inherit
